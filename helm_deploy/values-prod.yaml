---
# Per environment values which override defaults in hmpps-prisoner-apps-ui/values.yaml

generic-service:
  ingress:
    host: prisoner-apps.hmpps.service.justice.gov.uk

  env:
    INGRESS_URL: "https://prisoner-apps.hmpps.service.justice.gov.uk"
    HMPPS_AUTH_URL: "https://sign-in.hmpps.service.justice.gov.uk/auth"
    TOKEN_VERIFICATION_API_URL: "https://token-verification-api.prison.service.justice.gov.uk"
    LAUNCHPAD_AUTH_URL: "https://launchpad-auth.hmpps.service.justice.gov.uk" 
    EXAMPLE_API_URL: 'https://template-kotlin.hmpps.service.justice.gov.uk'
    PERSONAL_RELATIONSHIPS_API_URL: 'https://personal-relationships-api.hmpps.service.justice.gov.uk'
    OS_PLACES_API_URL: 'https://api.os.uk/search/places/v1'
    AUDIT_ENABLED: "false"

generic-prometheus-alerts:
  alertSeverity: hmpps-managing-prisoner-apps-prod
