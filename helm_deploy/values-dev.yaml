---
# Per environment values which override defaults in hmpps-prisoner-apps-ui/values.yaml

generic-service:
  replicaCount: 2

  ingress:
    host: prisoner-apps-dev.hmpps.service.justice.gov.uk

  env:
    INGRESS_URL: "https://prisoner-apps-dev.hmpps.service.justice.gov.uk"
    HMPPS_AUTH_URL: "https://sign-in-dev.hmpps.service.justice.gov.uk/auth"
    TOKEN_VERIFICATION_API_URL: "https://token-verification-api-dev.prison.service.justice.gov.uk"
    LAUNCHPAD_AUTH_URL: "https://launchpad-auth-dev.hmpps.service.justice.gov.uk"
    EXAMPLE_API_URL: 'https://template-kotlin-dev.hmpps.service.justice.gov.uk'
    ENVIRONMENT_NAME: DEV
    AUDIT_ENABLED: "false"

generic-prometheus-alerts:
  alertSeverity: hmpps-managing-prisoner-apps-nonprod
